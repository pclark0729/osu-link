# Build desktop installers and updater metadata (latest.json) for GitHub Releases.
#
# Signing (required for updater installs):
# - Generate a key pair (see Tauri updater docs: `tauri signer generate`).
# - Put the PUBLIC key in src-tauri/tauri.conf.json → plugins.updater.pubkey (committed).
# - Put the PRIVATE key in repo secret TAURI_SIGNING_PRIVATE_KEY (same key that matches pubkey).
# - If the private key is encrypted, set TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
# Rotating keys: generate a new pair, update pubkey in tauri.conf.json, ship a new app build,
# then use the new private key in CI for future releases.
#
# Before build, the app semver is taken from the git tag (v1.2.3 → 1.2.3) so latest.json
# matches the release. If you only bump the tag but leave tauri.conf.json at 0.1.0, the
# updater compares 0.1.0 == 0.1.0 and always reports "up to date".
#
# Release checklist: RELEASING.md
name: publish-tauri

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish (e.g. v1.2.3). Must match vX.Y.Z."
        required: true
        type: string

jobs:
  publish:
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install npm dependencies
        run: npm ci

      - name: Sync app version from release tag (see scripts/resolve-and-sync-version.mjs)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Tag must be vX.Y.Z (got $TAG)"
            exit 1
          fi
          export RELEASE_VERSION="$VERSION"
          node scripts/resolve-and-sync-version.mjs

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          releaseName: osu-link ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          releaseBody: See release assets to download installers. The desktop app checks this release for updates automatically.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
